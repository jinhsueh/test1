services:
  # ── 後端 FastAPI ──────────────────────────────────────────────
  - type: web
    name: linkbio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        # 部署後把這裡換成你的前端 Render 網址，例如：
        # https://linkbio-frontend.onrender.com
        value: https://linkbio-frontend.onrender.com

  # ── 前端 React (Static Site) ──────────────────────────────────
  - type: web
    name: linkbio-frontend
    runtime: static
    rootDir: linkbio
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # 部署後把這裡換成你的後端 Render 網址，例如：
        # https://linkbio-backend.onrender.com
        value: https://linkbio-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
